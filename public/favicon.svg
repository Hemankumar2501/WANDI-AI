<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient circle -->
  <circle cx="32" cy="32" r="32" fill="url(#gradient)"/>
  
  <!-- Compass icon -->
  <g transform="translate(16, 16)">
    <!-- Outer circle -->
    <circle cx="16" cy="16" r="14" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>
    
    <!-- Compass needle -->
    <path d="M16 4 L20 16 L16 14 L12 16 Z" fill="#22D3EE" stroke="white" stroke-width="1"/>
    <path d="M16 28 L12 16 L16 18 L20 16 Z" fill="white" stroke="white" stroke-width="1" opacity="0.6"/>
    
    <!-- Center dot -->
    <circle cx="16" cy="16" r="2" fill="white"/>
    
    <!-- Cardinal points -->
    <text x="16" y="6" text-anchor="middle" fill="white" font-size="4" font-weight="bold" opacity="0.8">N</text>
  </g>
  
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
